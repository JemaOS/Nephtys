<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  
  <!-- PWA Meta Tags -->
  <meta name="application-name" content="Nephtys" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nephtys" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#6b6fdb" />
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Messagerie sécurisée et chiffrée de bout en bout pour JemaOS" />
  <meta name="keywords" content="messagerie, chat, sécurisé, chiffrement, e2ee, nephtys, jemaos" />
  
  <!-- Open Graph -->
  <meta property="og:title" content="Nephtys - Messagerie Sécurisée" />
  <meta property="og:description" content="Application de messagerie chiffrée de bout en bout" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/icon.svg" />
  
  <!-- Icons - Using SVG for all platforms -->
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="manifest" href="/manifest.json" />
  
  <title>Nephtys - Messagerie Sécurisée</title>
  
  <!-- Critical CSS for initial loading state -->
  <style>
    /* Prevent flash of unstyled content */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #111b21;
      min-height: 100vh;
    }
    
    /* Initial loading state shown before React hydrates */
    #root:empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #111b21;
    }
    
    #root:empty::after {
      content: '';
      width: 48px;
      height: 48px;
      border: 4px solid #6b6fdb;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Hide loading state once React renders */
    #root:not(:empty)::after {
      display: none;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- Fallback for very slow connections -->
  <noscript>
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #111b21; color: #e9edef; font-family: system-ui, sans-serif; padding: 20px; text-align: center;">
      <h1 style="margin-bottom: 16px;">Nephtys</h1>
      <p>JavaScript est requis pour utiliser cette application.</p>
    </div>
  </noscript>
</body>

</html>
