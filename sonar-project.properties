# SonarQube Configuration for Nephtys

# Project identification
sonar.projectKey=nephtys
sonar.projectName=Nephtys
sonar.projectVersion=1.0.0

# Source code
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclusions
# Exclude test reports (already in .gitignore but need explicit exclusion for SonarQube)
sonar.exclusions=**/lhreport.html,**/playwright-report/**,**/test-results/**,**/*.sql,**/test/**

# Exclude node_modules
sonar.nodejs.exclusions=**/node_modules/**

# Test file exclusions
sonar.test.exclusions=**/test/**
sonar.test.inclusions=**/test/**/*.test.ts,**/test/**/*.test.tsx

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage (if available)
# sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
